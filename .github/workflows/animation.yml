name: animation
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  generate-svgs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk@v3.2.0
        with:
          github_user_name: Harold9893
          outputs: |
            dist/github-contribution-grid-snake.svg?year=all
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&year=all
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v2.6.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
